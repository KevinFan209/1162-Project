<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 3D Chess</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cylinder-container">
        <div class="cylinder">
            <div class="top"></div>
            <div class="bottom"></div>
        </div>
    </div>
    <div class="controls">
        <button id="play-button">
            <i class="fas fa-play"></i> Play
        </button>
        <button id="pause-button">
            <i class="fas fa-pause"></i> Pause
        </button>
        <div class="slider-group">
            <label for="cylinder-length">高度: <span id="length-value">450</span>px</label>
            <input id="cylinder-length" type="range" min="30" max="900">
        </div>
    </div>
    <script>
        const side_count = 60; // 圓柱體側面數量
        let length = 90; // 圓柱體高度
        const slider = document.getElementById('cylinder-length');
        slider.value = length;
        const cylinder = document.querySelector('.cylinder');
        const lengthInput = document.getElementById('cylinder-length');
        const lengthValue = document.getElementById('length-value');
        const existingSides = cylinder.querySelectorAll('.side');
        existingSides.forEach(side => side.remove());
        for (let i = 0; i < side_count; i++) {
            const side = document.createElement('div');
            side.className = 'side';
            cylinder.appendChild(side);
        }
        // 動態生成CSS規則
        const style = document.createElement('style');
        document.head.appendChild(style);
        const sides = cylinder.querySelectorAll('.side');
        const radius = 180; // 圓柱體半徑 (寬度360px的一半)
        const sideWidth = 2 * radius * Math.tan(Math.PI / sides.length) + 0.1; // 使用正n邊形邊長公式，並稍微增加以避免間隙
        const leftValue = (360 - sideWidth) / 2;
        const baseRule = `.side { width: ${sideWidth}px !important; height: ${length}px; left: ${leftValue}px !important; }`;
        style.sheet.insertRule(baseRule, style.sheet.cssRules.length);
        const angleIncrement = 360 / sides.length;
        sides.forEach((side, index) => {
            const angle = (index + 1) * angleIncrement;
            const rule = `.side:nth-child(${index + 3}) { transform: rotateY(${angle}deg) translateZ(180px); }`;
            style.sheet.insertRule(rule, style.sheet.cssRules.length);
        });

        function updateCylinderHeight(value) {
            length = Number(value);
            cylinder.style.height = `${length}px`;
            sides.forEach(side => side.style.height = `${length}px`);
            const top = document.querySelector('.top');
            const bottom = document.querySelector('.bottom');
            top.style.transform = `rotateX(90deg) translateZ(${radius}px)`;
            bottom.style.transform = `rotateX(-90deg) translateZ(${length - radius}px)`;
            lengthValue.textContent = length;
        }

        lengthInput.addEventListener('input', event => updateCylinderHeight(event.target.value));
        updateCylinderHeight(length);
    </script>
    <script src="script.js"></script>
</body>
</html>
