<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pypoly - Python Adventure</title>
    <style>
        :root {
            --primary-blue: #4facfe;
            --primary-yellow: #ffde59;
            --primary-pink: #ff9a9e;
            --success-green: #00cdac;
            --bg-light: #f8fbff;
            --text-dark: #000000; /* 標題改為純黑 */
            --text-gray: #636e72;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* 字體恢復為原本設定 */
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(79, 172, 254, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 222, 89, 0.1) 0%, transparent 20%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-gray);
        }

        .card {
            background: white;
            width: 420px;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(79, 172, 254, 0.15);
            text-align: center;
            position: relative;
            /* 移除黑框，改為淺色細邊框 */
            border: 2px solid #f1f2f6;
        }

        /* 標題改為純黑色，拿掉漸層 */
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 5px;
            color: var(--text-dark);
        }

        .tagline {
            font-size: 0.8rem;
            font-weight: 700;
            color: #b2bec3;
            letter-spacing: 3px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        .tabs {
            display: flex;
            background: #f1f2f6;
            border-radius: 15px;
            margin-bottom: 30px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 700;
            color: #636e72;
            transition: 0.3s;
        }

        .tab.active {
            background: white;
            color: var(--text-dark);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            margin-left: 5px;
            color: #636e72;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #f1f2f6;
            border-radius: 15px;
            background: #fdfdfd;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary-blue);
            background: white;
        }

        /* ---------------- 新增樣式 ---------------- */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -10px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0 5px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gray);
            cursor: pointer;
        }

        .remember-me input {
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: var(--text-dark);
        }

        .forgot-pw {
            color: var(--text-gray);
            text-decoration: none;
            transition: 0.2s;
        }

        .forgot-pw:hover {
            text-decoration: underline;
        }
        /* ---------------------------------------- */

        /* 鮮豔的 3D 按鈕 */
        button.btn-submit {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: var(--primary-yellow);
            color: #574b10;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 0 #e6c543;
            transition: 0.1s;
            margin-top: 10px;
        }

        button.btn-submit:hover {
            transform: translateY(2px);
            box-shadow: 0 4px 0 #e6c543;
        }

        button.btn-submit:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #e6c543;
        }

        /* Google 登入按鈕與分隔線 */
        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: #dfe6e9;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 2px;
            background: #f1f2f6;
            margin: 0 15px;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            border: 2px solid #f1f2f6;
            border-radius: 15px;
            background: white;
            color: #2d3436;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .google-btn:hover {
            background: #f8fbff;
            border-color: var(--primary-blue);
        }

        form { display: none; }
        form.active { display: block; animation: slideUp 0.4s ease; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        
    </style></head><body><div class="card">
    <div class="accent-dot"></div>
    <h1>PyPoly</h1>
    <p class="tagline">Python Adventure</p>

    <div class="tabs">
        <div class="tab active" id="loginTab" onclick="toggle('login')">登入遊戲</div>
        <div class="tab" id="regTab" onclick="toggle('register')">加入冒險</div>
    </div>

    <form id="loginForm" class="active">
        <div class="input-group">
            <label>PLAYER ID</label>
            <input type="text" placeholder="輸入帳號..." required>
        </div>
        <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" placeholder="••••••••" required>
        </div>

        <div class="form-options">
            <label class="remember-me">
                <input type="checkbox"> 記住我
            </label>
            <a href="#" class="forgot-pw">忘記密碼？</a>
        </div>

        <button type="submit" class="btn-submit">GO! 開始遊戲</button>
    </form>

    <form id="regForm">
        <div class="input-group">
            <label>NEW PLAYER ID</label>
            <input type="text" placeholder="取個帥氣的名字..." required>
        </div>
        <div class="input-group">
            <label>EMAIL</label>
            <input type="email" placeholder="冒險者的信箱..." required>
        </div>
        <div class="input-group">
            <label>SET PASSWORD</label>
            <input type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit" style="background: var(--success-green); color: white; box-shadow: 0 6px 0 #00a88b;">CREATE & GO!</button>
    </form>

    <div class="divider">或者使用</div>

    <button class="google-btn">
        <svg width="20" height="20" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google 帳號快速登入
    </button></div><script>
    function toggle(mode) {
        const loginForm = document.getElementById('loginForm');
        const regForm = document.getElementById('regForm');
        const loginTab = document.getElementById('loginTab');
        const regTab = document.getElementById('regTab');

        if (mode === 'register') {
            loginForm.classList.remove('active');
            regForm.classList.add('active');
            loginTab.classList.remove('active');
            regTab.classList.add('active');
        } else {
            loginForm.classList.add('active');
            regForm.classList.remove('active');
            loginTab.classList.add('active');
            regTab.classList.remove('active');
        }
    }</script></body></html>
