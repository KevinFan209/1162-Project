<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PyPoly - 遊戲進行中</title>
    <link rel="stylesheet" href="./css/game.css">
</head>
<body>

    <div id="unity-container">
        <div id="unity-canvas-placeholder">
            [ Unity WebGL Game Canvas Area ]
            <br>顯示 3D 大富翁地圖與小車
        </div>
    </div>

    <div class="center-logo">PyPoly</div>

    <div class="hud-top">
        <div class="player-card p1">
            <div class="info-row">
                <div class="avatar">🚗</div>
                <div>
                    <div style="font-weight: bold;">Sandy (P1)</div>
                    <div class="money">💰 $2,850</div>
                </div>
            </div>
            <div class="lap">目標圈數：1 / 3</div>
            <div class="inventory">
                <span class="card-tag">if</span>
                <span class="card-tag">for</span>
                <span class="card-tag">list</span>
            </div>
        </div>

        <div class="player-card p2">
            <div class="info-row">
                <div class="avatar">🏎️</div>
                <div>
                    <div style="font-weight: bold;">Opponent (P2)</div>
                    <div class="money">💰 $1,400</div>
                </div>
            </div>
            <div class="lap">目標圈數：1 / 3</div>
            <div class="inventory">
                <span class="card-tag">print</span>
                <span class="card-tag">var</span>
            </div>
        </div>
    </div>

    <div class="vision-panel">
        <div class="webcam-feed"></div>
        
        <div class="recognition-overlay">
            <div class="scan-frame">
                <div class="scan-line"></div>
            </div>
            <div class="result-badge">✅ RECOGNIZED: for loop</div>
        </div>
        
        <div style="position: absolute; bottom: 8px; left: 10px; font-size: 10px; color: var(--accent-green); font-family: monospace;">
            CV ENGINE: ACTIVE
        </div>
    </div>

</body>
</html>
