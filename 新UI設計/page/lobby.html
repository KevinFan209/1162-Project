<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPoly - Lobby</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/lobby.css">
</head>
</head>
<body>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
    <a href="#" class="menu-item"><span>⚙️</span> 遊戲設定</a>
    <a href="#" class="menu-item"><span>📖</span> 遊戲說明</a>
    <a href="#" class="menu-item"><span>📊</span> 學習統計</a>
    <a href="Login.html" class="menu-item danger"><span>🚪</span> 登出遊戲</a>
</div>

<header>
    <div class="header-left"><h1>PyPoly</h1></div>
    <div class="header-right">
        <div class="player-name">Sandy</div>
        <button class="menu-btn" onclick="toggleMenu()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
    </div>
</header>

<div class="lobby-main">
    <div class="lobby-container">
        <aside class="sidebar">
            <h2 style="font-weight: 900; font-size: 1.8rem; color: var(--text-dark); margin-bottom: 25px; letter-spacing: 1px;">遊戲大廳</h2>
            <div class="char-box"><div style="color:var(--primary-blue); font-weight:800;">[Q版角色]</div></div>
            <div class="id-label">Sandy</div>
            <button class="btn-3d btn-side" style="margin-top: 25px;">切換角色</button>
        </aside>

        <main class="main-board">
            <header class="board-header">
                <h3 style="font-weight: 900; font-size: 1.4rem;">尋找挑戰者</h3>
                <button class="btn-3d btn-create" onclick="location.href='CreateRoom.html'">+ 建立新對局</button>
            </header>
            
            <section class="room-scroll">
                <div style="font-weight: 900; font-size: 1.4rem; color: var(--text-black); margin-bottom: 20px; padding-left: 5px;">
                    公開房間列表
                </div>

                <div class="room-item">
                    <div>
                        <div style="font-weight: 900; font-size: 1.3rem;">柏睿的基礎教室</div>
                        <p style="font-size: 0.95rem; color: #64748b; font-weight: 700; margin-top: 6px;">基礎版 | 3 圈</p>
                    </div>
                    <div style="text-align: right;">
                        <span style="font-size: 0.85rem; color: #64748b; font-weight: 900; display: block; margin-bottom: 10px;">等待中 (1/2)</span>
                        <button class="btn-3d btn-join" onclick="location.href='Game.html'">加入</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>


    <script src="js/lobby.js"></script>
</body>
</html>
