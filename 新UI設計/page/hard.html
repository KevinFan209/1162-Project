<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPoly - Task Advanced Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hard.css">
</head>
</head>
<body>

    <div class="task-overlay">
        <div class="task-card">
            
            <div class="task-header-box">
                <h2>系統任務</h2>
                <div class="task-badge">進階實作</div>
            </div>

            <div class="task-body">
                <p class="task-instruction">請撰寫完整的代碼來獲得購買資格：</p>

                <div class="code-window">
                    <div class="code-top">
                        <div class="code-dots">
                            <span style="background:#ff5f56"></span>
                            <span style="background:#ffbd2e"></span>
                            <span style="background:#27c93f"></span>
                        </div>
                        <div class="code-filename">challenge.py</div>
                    </div>
                    <div class="editor-content">
                        <textarea id="answerHard" class="code-textarea" spellcheck="false" placeholder="# 請在此輸入代碼..."></textarea>
                        <span class="comment"># 任務：定義變數 price 並設定為 1500</span>
                    </div>
                </div>

                <div id="feedback" class="feedback-area"></div>

                <div class="task-footer">
                    <button class="btn-3d btn-cancel" onclick="closeWindow()">暫不購買</button>
                    <button class="btn-3d btn-submit" onclick="check()">驗證運行</button>
                </div>
            </div>
        </div>
    </div>


    <script src="js/hard.js"></script>
</body>
</html>
