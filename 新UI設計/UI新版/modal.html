<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPoly - 建立對局</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/modal.css">
</head>
<body>

<header>
    <div class="header-left">
        <h1>PyPoly</h1>
    </div>
</header>

<div class="create-main">
    <div class="create-card">
        <h2 class="section-title">建立新對局</h2>

        <div class="form-group">
            <label>對局名稱</label>
            <input type="text" id="roomName" value="Sandy 的冒險教室">
        </div>

        <div class="form-group">
            <label>選擇遊戲版本</label>
            <div class="version-selector">
                <div class="version-card active" onclick="selectVer(this)">
                    <h4>基礎版</h4>
                    <p>適合初學者</p>
                </div>
                <div class="version-card" onclick="selectVer(this)">
                    <h4>進階版</h4>
                    <p>邏輯與演算法</p>
                </div>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>遊戲難易度</label>
                <select>
                    <option>簡單 (Easy)</option>
                    <option>普通 (Normal)</option>
                    <option>困難 (Hard)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>最大人數</label>
                <select id="maxPlayers">
                    <option value="1">1 人</option>
                    <option value="2" selected>2 人</option>
                </select>
            </div>
        </div>

        <div class="setting-row">
            <div class="setting-label">勝利圈數</div>
            <select style="width: 120px; padding: 5px;">
                <option>1 圈</option>
                <option>2 圈</option>
                <option selected>3 圈</option>
                <option>4 圈</option>
                <option>5 圈</option>
            </select>
        </div>

        <div class="setting-row">
            <div class="setting-label">房間類型</div>
            <select style="width: 120px; padding: 5px;">
                <option>公開</option>
                <option>私人</option>
            </select>
        </div>

        <div class="setting-row" style="border-bottom: 1px solid var(--border-light); margin-bottom: 5px;">
            <div class="setting-label">人機對戰 (AI)</div>
            <select id="aiToggle" style="width: 120px; padding: 5px;" onchange="handleAILogic()">
                <option value="off">關閉</option>
                <option value="on">開啟</option>
            </select>
        </div>

        <button class="btn-confirm" onclick="location.href='Game.html'">
            確認建立 & GO!
        </button>

        <a href="Lobby.html" class="btn-back">返回大廳</a>
    </div>
</div>

<script src="js/modal.js"></script>

</body>
</html>
