<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPoly - 個人主頁</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="sideMenu">
    <a href="Profile.html" class="menu-item"><span>👤</span> 個人主頁</a>
    <a href="Guide.html" class="menu-item"><span>📖</span> 遊戲說明</a>
    <a href="learn.html" class="menu-item"><span>📊</span> 學習統計</a>
    <a href="#" class="menu-item"><span>⚙️</span> 遊戲設定</a>
    <a href="Lobby.html" class="menu-item"><span>🏠</span> 返回大廳</a>
    <a href="Login.html" class="menu-item danger"><span>🚪</span> 登出遊戲</a>
</div>

<header>
    <div class="header-left"><h1>PyPoly</h1></div>
    <div class="header-right">
        <div class="page-tag">個人主頁 👤</div>
        <button class="menu-btn" onclick="toggleMenu()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
    </div>
</header>

<div class="profile-main">
    <div class="profile-container">
        <aside class="profile-aside">
            <div class="avatar-box">
                <div style="font-size: 3rem;">👤</div>
                <p style="margin-top:10px;">點擊更換頭像</p>
            </div>
            <div class="current-id">Sandy</div>
            <div class="current-email">sandy@example.com</div>
        </aside>

        <main class="profile-content">
            <h2 style="font-weight: 900; margin-bottom: 25px;">編輯帳戶資訊</h2>
            
            <div class="form-group">
                <label class="form-label">更改使用者 ID</label>
                <input type="text" class="form-input" value="Sandy">
            </div>

            <div class="form-group">
                <label class="form-label">電子信箱 (Email)</label>
                <input type="email" class="form-input" value="sandy@example.com">
            </div>

            <hr style="border: 0; border-top: 2px dashed var(--border-light); margin-bottom: 25px;">

            <div class="form-group">
                <div class="label-row">
                    <label class="form-label">原密碼 (Old Password)</label>
                    <a href="ForgotPassword.html" class="forgot-link">忘記密碼？</a>
                </div>
                <input type="password" class="form-input" placeholder="請輸入當前密碼以進行修改">
            </div>

            <div class="form-group">
                <label class="form-label">設定新密碼 (New Password)</label>
                <input type="password" class="form-input" placeholder="請輸入新密碼">
            </div>

            <div class="btn-group">
                <button class="btn-3d btn-cancel" onclick="location.href='Lobby.html'">取消修改</button>
                <button class="btn-3d btn-save">確認儲存</button>
            </div>
        </main>
    </div>
</div>

<script src="js/profile.js"></script>
</body>
</html>
