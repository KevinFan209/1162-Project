<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPoly - 遊戲結算</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/results.css">
</head>
<body>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
    <a href="Profile.html" class="menu-item"><span>👤</span> 個人主頁</a>
    <a href="Guide.html" class="menu-item"><span>📖</span> 遊戲說明</a>
    <a href="learn.html" class="menu-item"><span>📊</span> 學習統計</a>
    <a href="#" class="menu-item"><span>⚙️</span> 遊戲設定</a>
    <a href="Lobby.html" class="menu-item"><span>🏠</span> 返回大廳</a>
    <a href="Login.html" class="menu-item danger"><span>🚪</span> 登出遊戲</a>
</div>

<header>
    <div class="header-left"><h1>PyPoly</h1></div>
    <div class="header-right">
        <div class="page-tag">遊戲對局結算 🏆</div>
        <button class="menu-btn" onclick="toggleMenu()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
    </div>
</header>

<div class="results-main">
    <section class="leaderboard-card">
        <div class="section-title">🏆 誰是 Python 大富翁？</div>
        <div class="ranking-list">
            <div class="ranking-item winner">
                <div class="rank-info"><div class="rank-num">1</div><div class="player-meta"><h4>Sandy (P1)</h4></div></div>
                <div class="rank-score"><span class="score-val">4,250</span><span style="color:var(--success-green); font-weight:800; font-size:0.9rem;">答對率 92%</span></div>
            </div>
            <div class="ranking-item">
                <div class="rank-info"><div class="rank-num">2</div><div class="player-meta"><h4>AI Bot (P2)</h4></div></div>
                <div class="rank-score"><span class="score-val">1,800</span><span style="color:var(--text-gray); font-weight:800; font-size:0.9rem;">答對率 65%</span></div>
            </div>
        </div>
    </section>

    <section class="report-card">
        <div class="report-header">本局整體答題數據</div>
        <div class="data-box">
            <div class="data-item">
                <div class="data-label">最常出現語法</div>
                <div class="data-value">if-else 條件判斷 <span>5 次</span></div>
            </div>
            <div class="data-item">
                <div class="data-label">變數宣告次數</div>
                <div class="data-value">Variables <span>3 次</span></div>
            </div>
            <div class="data-item">
                <div class="data-label">答題平均用時</div>
                <div class="data-value">12.5 <span>秒</span></div>
            </div>
            <div class="data-item">
                <div class="data-label">實體動作達成</div>
                <div class="data-value">開合跳 <span>100%</span></div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-3d btn-home" onclick="location.href='Lobby.html'">回大廳</button>
            <button class="btn-3d btn-again" onclick="location.href='Battle.html'">再挑戰</button>
        </div>
    </section>
</div>

<script src="js/results.js"></script>
</body>
</html>
