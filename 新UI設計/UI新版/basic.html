<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPoly - Task Basic Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/basic.css">
</head>
<body>

    <div class="task-overlay">
        <div class="task-card">
            
            <div class="task-header-box">
                <h2>系統任務</h2>
                <div class="task-badge">基礎挑戰</div>
            </div>

            <div class="task-body">
                <p class="task-instruction">請在下方填入正確的數值以解鎖購買資格：</p>

                <div class="code-window">
                    <div class="code-top">
                        <div class="code-dots">
                            <span style="background:#ff5f56"></span>
                            <span style="background:#ffbd2e"></span>
                            <span style="background:#27c93f"></span>
                        </div>
                        <div class="code-filename">quest.py</div>
                    </div>
                    <div class="editor-content">
                        <div>
                            <span class="keyword">gold_amount</span> = 
                            <input type="text" id="answer" class="code-input" placeholder="???" autocomplete="off">
                        </div>
                        <span class="comment"># 目標：設定為整數 1500</span>
                    </div>
                </div>

                <div id="feedback" class="feedback-area"></div>

                <div class="task-footer">
                    <button class="btn-3d btn-cancel" onclick="closeWindow()">暫不購買</button>
                    <button class="btn-3d btn-submit" onclick="check()">驗證運行</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/basic.js"></script>
</body>
</html>
