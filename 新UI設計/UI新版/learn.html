<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPoly - 學習成就統計</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/learn.css">
</head>
<body>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
    <a href="Profile.html" class="menu-item"><span>👤</span> 個人主頁</a>
    <a href="Guide.html" class="menu-item"><span>📖</span> 遊戲說明</a>
    <a href="learn.html" class="menu-item"><span>📊</span> 學習統計</a>
    <a href="#" class="menu-item"><span>⚙️</span> 遊戲設定</a>
    <a href="Lobby.html" class="menu-item"><span>🏠</span> 返回大廳</a>
    <a href="Login.html" class="menu-item danger"><span>🚪</span> 登出遊戲</a>
</div>

<header>
    <div class="header-left"><h1>PyPoly</h1></div>
    <div class="header-right">
        <div class="page-tag">學習統計 📊</div>
        <button class="menu-btn" onclick="toggleMenu()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
    </div>
</header>

<div class="stats-main">
    <div class="stats-content">
        <div class="summary-grid">
            <div class="summary-card">
                <div class="summary-label">PYTHON 正確率</div>
                <div class="summary-value">85<span class="summary-unit">%</span></div>
            </div>
            <div class="summary-card">
                <div class="summary-label">累積資產</div>
                <div class="summary-value">4,250</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">海關運動量</div>
                <div class="summary-value">120</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-header">Python 知識維度分析</div>
            <div class="progress-list">
                <div class="progress-item">
                    <div class="skill-name">基礎變數</div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: 95%;"></div></div>
                </div>
                <div class="progress-item">
                    <div class="skill-name">條件判斷</div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: 80%;"></div></div>
                </div>
                <div class="progress-item">
                    <div class="skill-name">迴圈控制</div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: 65%;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="side-ai-panel">
        <div class="ai-header"><div class="ai-status-dot"></div> AI 導師即時分析</div>
        <div class="ai-report-box">
            Hey <b>Sandy</b>！你在基礎語法上表現優異。目前的挑戰是<b>迴圈控制</b>，建議針對 <code>while</code> 迴圈多練習。繼續保持高頻率的開合跳，這對大腦很有幫助！
        </div>
        <button class="btn-action" onclick="location.href='Lobby.html'">返回大廳</button>
    </div>
</div>

<script src="js/learn.js"></script>
</body>
</html>
