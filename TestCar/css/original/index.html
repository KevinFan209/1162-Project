<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>3D Game Car (Fixed)</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="scene">
    <div class="car" id="car">

      <!-- 車身 -->
      <div class="car-body">
        <div class="front"></div>
        <div class="back"></div>
        <div class="left"></div>
        <div class="right"></div>
        <div class="top"></div>
        <div class="bottom"></div>
      </div>

      <!-- 車窗 / 車頂 -->
      <div class="car-cabin">
        <div class="window-left"></div>
        <div class="window-right"></div>
        <div class="window-front"></div>
        <div class="window-back"></div>
        <div class="window-top"></div>
      </div>

      <!-- 車燈 -->
      <div class="light front-light-left"></div>
      <div class="light front-light-right"></div>
      <div class="light back-light-left"></div>
      <div class="light back-light-right"></div>

      <!-- 輪子 -->
      <div class="wheel w1"></div>
      <div class="wheel w2"></div>
      <div class="wheel w3"></div>
      <div class="wheel w4"></div>

    </div>
  </div>
</body>
</html>
