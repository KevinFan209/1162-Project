<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PyPoly - 雙人對戰大廳</title>
    <style>
        :root {
            --bg-color: #05050a;
            --card-bg: rgba(15, 23, 42, 0.9);
            --accent-cyan: #00d2ff;
            --accent-purple: #9d50bb;
            --text-main: #f1f5f9;
        }

        body {
            margin: 0; background: var(--bg-color);
            background-image: linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; color: var(--text-main);
            font-family: 'Segoe UI', 'PingFang TC', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .container { width: 100%; max-width: 400px; text-align: center; }

        /* 頂部 LOGO 區 */
        .header { margin-bottom: 25px; }
        .game-icon {
            width: 60px; height: 60px; background: linear-gradient(135deg, #306998, var(--accent-cyan));
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            margin: 0 auto 15px; font-size: 30px; box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }
        .logo-text {
            font-size: 42px; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(to right, #306998, var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.5)); margin: 0;
        }

        /* 主卡片區域 */
        .auth-card {
            background: var(--card-bg); border-radius: 24px; padding: 40px;
            border: 1px solid rgba(0, 210, 255, 0.2); backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        /* 格子切換 Tabs */
        .tab-group {
            display: flex; background: rgba(0,0,0,0.5); border-radius: 12px;
            padding: 5px; margin-bottom: 30px; border: 1px solid #333;
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: transparent;
            color: #666; cursor: pointer; font-size: 14px; border-radius: 8px; transition: 0.3s;
        }
        .tab-btn.active {
            background: linear-gradient(45deg, #306998, var(--accent-purple));
            color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
        }

        /* 表單與輸入框 */
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 8px; margin-left: 5px; text-transform: uppercase; }
        
        .input-wrapper { position: relative; }
        .input-wrapper span { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5; }
        
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 12px 12px 12px 40px; box-sizing: border-box;
            background: rgba(0,0,0,0.4); border: 1px solid #333;
            color: white; border-radius: 10px; font-size: 14px; transition: 0.3s;
        }
        input:focus { border-color: var(--accent-cyan); outline: none; box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        /* 修正後的 記住我 佈局 */
        .helper-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #777;
            margin-bottom: 25px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px; /* 勾選框跟文字的距離 */
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto; /* 確保不會佔滿 100% */
            margin: 0;
            cursor: pointer;
        }

        .helper-row a { color: var(--accent-cyan); text-decoration: none; }

        /* 主按鈕 */
        .btn-main {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            background: linear-gradient(45deg, #306998, var(--accent-purple));
            color: white; font-size: 16px; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }
        .btn-main:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Google 登入 */
        .divider { margin: 25px 0; display: flex; align-items: center; color: #444; font-size: 12px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #222; margin: 0 10px; }

        .btn-google {
            width: 100%; padding: 12px; border: 1px solid #333; background: white;
            border-radius: 10px; display: flex; justify-content: center; align-items: center;
            gap: 10px; cursor: pointer; font-size: 14px; color: #444; font-weight: 500;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="game-icon">🎮</div>
        <h1 class="logo-text">PyPoly</h1>
        <div style="font-size: 12px; letter-spacing: 4px; opacity: 0.5; margin-top: 5px;">PYTHON ADVENTURE</div>
    </div>

    <div class="auth-card">
        <div class="tab-group">
            <button id="tab-login" class="tab-btn active" onclick="switchTab('login')">登入</button>
            <button id="tab-signup" class="tab-btn" onclick="switchTab('signup')">註冊</button>
        </div>

        <div id="login-form">
            <div class="form-group">
                <label>電子郵件</label>
                <div class="input-wrapper">
                    <span>📧</span>
                    <input type="email" id="login-email" placeholder="your@email.com">
                </div>
            </div>
            <div class="form-group">
                <label>密碼</label>
                <div class="input-wrapper">
                    <span>🔒</span>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
            </div>
            <div class="helper-row">
                <label class="checkbox-group">
                    <input type="checkbox"> 記住我
                </label>
                <a href="#">忘記密碼？</a>
            </div>
            <button class="btn-main" onclick="login()">開始遊戲</button>
        </div>

        <div id="signup-form" class="hidden">
            <div class="form-group">
                <label>使用者名稱</label>
                <div class="input-wrapper">
                    <span>👤</span>
                    <input type="text" id="reg-username" placeholder="玩家暱稱">
                </div>
            </div>
            <div class="form-group">
                <label>電子郵件</label>
                <div class="input-wrapper">
                    <span>📧</span>
                    <input type="email" id="reg-email" placeholder="your@email.com">
                </div>
            </div>
            <div class="form-group">
                <label>密碼</label>
                <div class="input-wrapper">
                    <span>🔒</span>
                    <input type="password" id="reg-password" placeholder="至少8位字元">
                </div>
            </div>
            <div class="helper-row">
                <label class="checkbox-group" style="font-size: 11px;">
                    <input type="checkbox"> 我同意服務條款與隱私政策
                </label>
            </div>
            <button class="btn-main" onclick="register()">建立帳號</button>
        </div>

        <div class="divider">或使用其他方式</div>

        <button class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18">
            使用 Google 帳號登入
        </button>
    </div>
</div>

<script>
function switchTab(type) {
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const loginTab = document.getElementById('tab-login');
        const signupTab = document.getElementById('tab-signup');

        if (type === 'login') {
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
        } else {
            loginForm.classList.add('hidden');
            signupForm.classList.remove('hidden');
            loginTab.classList.remove('active');
            signupTab.classList.add('active');
        }
    }
	
const API = "login.php";

/* ================= 登入 ================= */
async function login() {
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;

    if (!email || !password) {
        alert("請輸入帳號密碼");
        return;
    }

    const body = new URLSearchParams({
        action: "login",
        email: email,
        password: password
    });

    try {
        const res = await fetch(API, {
            method: "POST",
            body: body
        });

        if (!res.ok) throw new Error();

        const data = await res.json();

        if (data.status === "success") {
            localStorage.setItem("token", data.token);

            // 可選：記住我
            if (document.querySelector("#login-form input[type=checkbox]").checked) {
                localStorage.setItem("rememberEmail", email);
            }

            location.href = "lobby.html";
        } else {
            alert(data.message);
        }

    } catch (err) {
        alert("登入失敗（伺服器錯誤）");
    }
}

/* ================= 註冊 ================= */
async function register() {
    const username = document.getElementById("reg-username").value;
    const email = document.getElementById("reg-email").value;
    const password = document.getElementById("reg-password").value;

    if (!username || !email || !password) {
        alert("請填寫所有欄位");
        return;
    }

    if (password.length < 8) {
        alert("密碼至少 8 碼");
        return;
    }

    const body = new URLSearchParams({
        action: "register",
        username: username,
        email: email,
        password: password
    });

    try {
        const res = await fetch(API, {
            method: "POST",
            body: body
        });

        if (!res.ok) throw new Error();

        const data = await res.json();

        alert(data.message);

        if (data.status === "success") {
            switchTab("login");
        }

    } catch (err) {
        alert("註冊失敗（伺服器錯誤）");
    }
}

/* ================= 自動填入記住我 ================= */
window.onload = function () {
    const savedEmail = localStorage.getItem("rememberEmail");
    if (savedEmail) {
        document.getElementById("login-email").value = savedEmail;
    }
};
</script>

</body>
</html>
