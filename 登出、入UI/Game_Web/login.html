<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyPoly - Python Adventure</title>

<style>
:root {
    --primary-blue: #4facfe;
    --primary-yellow: #ffde59;
    --primary-pink: #ff9a9e;
    --success-green: #00cdac;
    --bg-light: #f8fbff;
    --text-dark: #000000;
    --text-gray: #636e72;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', '微軟正黑體', sans-serif;
}

body {
    background-color: var(--bg-light);
	background-image: 
                radial-gradient(circle at 10% 20%, rgba(79, 172, 254, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 222, 89, 0.1) 0%, transparent 20%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
	color: var(--text-gray);
}

.card {
    background: white;
    width: 420px;
    padding: 50px 40px;
    border-radius: 30px;
    box-shadow: 0 20px 50px rgba(79, 172, 254, 0.15);
    text-align: center;
	position: relative;
    border: 2px solid #f1f2f6;
}

h1 {
    font-size: 3.5rem;
    font-weight: 900;
    margin-bottom: 5px;
    color: var(--text-dark);
}

.tagline {
    font-size: 0.8rem;
    font-weight: 700;
    color: #b2bec3;
    letter-spacing: 3px;
    margin-bottom: 35px;
    text-transform: uppercase;
}

.tabs {
    display: flex;
    background: #f1f2f6;
    border-radius: 15px;
    margin-bottom: 30px;
    padding: 5px;
}

.tab {
    flex: 1;
    padding: 12px;
    cursor: pointer;
    border-radius: 12px;
    font-weight: 700;
    color: #636e72;
	transition: 0.3s;
}

.tab.active {
    background: white;
    color: var(--text-dark);
	box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.input-group {
    margin-bottom: 20px;
    text-align: left;
}

label {
    display: block;
    font-size: 0.8rem;
    font-weight: 700;
    margin-bottom: 8px;
	margin-left: 5px;
    color: #636e72;
}

input {
    width: 100%;
    padding: 14px;
    border: 2px solid #f1f2f6;
    border-radius: 15px;
	background: #fdfdfd;
    font-size: 1rem;
    outline: none;
    transition: 0.3s;
}

input:focus {
            border-color: var(--primary-blue);
            background: white;
}

.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: -10px;
    margin-bottom: 25px;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0 5px;
}

.remember-me {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-gray);
    cursor: pointer;
}

.remember-me input {
    cursor: pointer;
    width: 16px;
    height: 16px;
    accent-color: var(--text-dark);
}

.forgot-pw {
    color: var(--text-gray);
    text-decoration: none;
    transition: 0.2s;
}

.forgot-pw:hover {
    text-decoration: underline;
}

button.btn-submit {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 15px;
    background: var(--primary-yellow);
    color: #574b10;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 0 #e6c543;
    transition: 0.1s;
    margin-top: 10px;
}

button.btn-submit:hover {
    transform: translateY(2px);
    box-shadow: 0 4px 0 #e6c543;
}

button.btn-submit:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #e6c543;
}

.divider {
    margin: 25px 0;
    display: flex;
    align-items: center;
    color: #dfe6e9;
    font-size: 0.8rem;
    font-weight: 700;
}

.divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 2px;
    background: #f1f2f6;
    margin: 0 15px;
}

.google-btn {
    width: 100%;
    padding: 12px;
    border: 2px solid #f1f2f6;
	border-radius: 15px;
    background: white;
    color: #2d3436;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: 0.2s;
}

.google-btn:hover {
    background: #f8fbff;
    border-color: var(--primary-blue);
}

form { display: none; }
form.active { display: block; animation: slideUp 0.4s ease; }

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
        }
</style>
</head>

<body>
<div class="card">
<div class="accent-dot"></div>

<h1>PyPoly</h1>
<p class="tagline">Python Adventure</p>

<div class="tabs">
    <div class="tab active" id="loginTab" onclick="switchTab('login')">登入遊戲</div>
    <div class="tab" id="regTab" onclick="switchTab('register')">加入冒險</div>
</div>

<!-- 登入 -->
<form id="loginForm" class="active">
    <div class="input-group">
        <label>EMAIL</label>
        <input type="email" id="login-email" placeholder="your@email.com">
    </div>

    <div class="input-group">
        <label>PASSWORD</label>
        <input type="password" id="login-password" placeholder="••••••••">
    </div>

    <div class="form-options">
        <label class="remember-me">
            <input type="checkbox"> 記住我
        </label>
        <a href="#"class="forgot-pw">忘記密碼？</a>
    </div>

    <button type="button" class="btn-submit" onclick="login()">GO! 開始遊戲</button>
</form>

<!-- 註冊 -->
<form id="regForm">
    <div class="input-group">
        <label>USERNAME</label>
        <input type="text" id="reg-username">
    </div>

    <div class="input-group">
        <label>EMAIL</label>
        <input type="email" id="reg-email">
    </div>

    <div class="input-group">
        <label>PASSWORD</label>
        <input type="password" id="reg-password">
    </div>

    <button type="button" class="btn-submit" style="background: var(--success-green); color:white;box-shadow: 0 6px 0 #00a88b;" onclick="register()">CREATE & GO!</button>
</form>

<div class="divider">或者使用</div>

<div id="g_id_onload"
     data-client_id="1049490551958-nfqaifoojl7ipdi6922iomtm9tq54488.apps.googleusercontent.com"
     data-callback="handleGoogleLogin">
</div>

<div class="g_id_signin" data-type="standard"></div>

</div>

<script>
function switchTab(type) {
    const loginForm = document.getElementById('loginForm');
    const regForm = document.getElementById('regForm');
    const loginTab = document.getElementById('loginTab');
    const regTab = document.getElementById('regTab');

    if (type === 'login') {
        loginForm.classList.add('active');
        regForm.classList.remove('active');
        loginTab.classList.add('active');
        regTab.classList.remove('active');
    } else {
        loginForm.classList.remove('active');
        regForm.classList.add('active');
        loginTab.classList.remove('active');
        regTab.classList.add('active');
    }
}

const API = "login.php";

async function handleGoogleLogin(response) {

    console.log("Google response:", response); // ⭐ 加這行

    const id_token = response.credential;

    if (!id_token) {
        alert("沒有取得 Google Token");
        return;
    }

    try {
        const res = await fetch("login.php", {
            method: "POST",
            body: new URLSearchParams({
                action: "googleLogin",
                token: id_token
            })
        });

        const data = await res.json();

        console.log("後端回應:", data); // ⭐ 加這行

        if (data.status === "success") {
            localStorage.setItem("token", data.token);
            location.href = "lobby.html";
        } else {
            alert(data.message);
        }

    } catch (err) {
        console.error(err); // ⭐ 改這個
        alert("Google 登入失敗");
    }
}

async function login() {
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;

    if (!email || !password) {
        alert("請輸入帳號密碼");
        return;
    }

    const body = new URLSearchParams({
        action: "login",
        email: email,
        password: password
    });

    try {
        const res = await fetch(API, {
            method: "POST",
            body: body
        });

        const data = await res.json();

        if (data.status === "success") {
            localStorage.setItem("token", data.token);

            if (document.querySelector("#loginForm input[type=checkbox]").checked) {
                localStorage.setItem("rememberEmail", email);
            }

            location.href = "lobby.html";
        } else {
            alert(data.message);
        }

    } catch (err) {
        alert("登入失敗（伺服器錯誤）");
    }
}

async function register() {
    const username = document.getElementById("reg-username").value;
    const email = document.getElementById("reg-email").value;
    const password = document.getElementById("reg-password").value;

    if (!username || !email || !password) {
        alert("請填寫所有欄位");
        return;
    }

    if (password.length < 8) {
        alert("密碼至少 8 碼");
        return;
    }

    const body = new URLSearchParams({
        action: "register",
        username: username,
        email: email,
        password: password
    });

    try {
        const res = await fetch(API, {
            method: "POST",
            body: body
        });

        const data = await res.json();

        alert(data.message);

        if (data.status === "success") {
            switchTab("login");
        }

    } catch (err) {
        alert("註冊失敗（伺服器錯誤）");
    }
}

window.onload = async function () {

    // =============================
    // 1. 記住我
    // =============================
    const savedEmail = localStorage.getItem("rememberEmail");
    if (savedEmail) {
        document.getElementById("login-email").value = savedEmail;
    }

    // =============================
    // 2. 取得 token
    // =============================
    const token = localStorage.getItem("token");
    if (!token) return;

    try {
        // =============================
        // 3. 驗證 token
        // =============================
        const res = await fetch("login.php", {
            method: "POST",
            body: new URLSearchParams({
                action: "verify",
                token: token
            })
        });

        const data = await res.json();

        if (data.status === "success") {

            console.log("自動登入成功", data.user);

            // =============================
            // 4. 🔥 自動續期（重點）
            // =============================
            const refreshRes = await fetch("login.php", {
                method: "POST",
                body: new URLSearchParams({
                    action: "refresh",
                    token: token
                })
            });

            const refreshData = await refreshRes.json();

            if (refreshData.status === "success") {
                // 👉 更新 token（延長登入時間）
                localStorage.setItem("token", refreshData.token);
                console.log("Token 已續期");
            }

            // =============================
            // 5. 進入大廳
            // =============================
            location.href = "lobby.html";

        } else {
            // token 過期或無效
            localStorage.removeItem("token");
        }

    } catch (err) {
        console.log("驗證失敗", err);
    }
};
</script>

</body>
</html>
